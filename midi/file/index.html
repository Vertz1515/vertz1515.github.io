<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading… — Vertz1515 MIDI Files</title>

  <!-- Open Graph / embed metadata (values filled in by file.js) -->
  <meta property="og:site_name" content="Vertz1515 MIDI Files">
  <meta property="og:type"      content="music.song">
  <meta property="og:title"     content="Vertz1515 MIDI Files">
  <meta property="og:description" content="A MIDI file from the Vertz1515 archive.">
  <meta property="og:image"     content="https://vertz1515.com/midi/assets/images/placeholder.png">
  <meta property="og:url"       content="">
  <meta name="twitter:card"     content="summary">

  <link rel="stylesheet" href="/midi/assets/css/midi.css">
  <link rel="stylesheet" href="/midi/assets/css/theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      padding: 1rem;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    header nav a {
      text-decoration: none;
      color: var(--accent);
    }

    .controls button {
      cursor: pointer;
    }

    main.container {
      max-width: 900px;
      margin: 0 auto;
    }

    section#midi-file {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
    }

    /* Styles for dynamically injected file-card */
    .file-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 1.25rem;
      border-radius: 12px;
      background: color-mix(in srgb, var(--bg) 92%, white 8%);
      border: 1px solid color-mix(in srgb, var(--fg) 15%, transparent);
    }

    .file-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .file-layout {
        grid-template-columns: 280px 1fr;
      }
    }

    .file-card img {
      width: 100%;
      max-width: 280px;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      background: color-mix(in srgb, var(--bg) 85%, var(--fg));
    }

    .file-card > div {
      flex: 1 1 auto;
      min-width: 200px;
    }

    audio {
      width: 100%;
      margin-top: 1rem;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem 0;
    }

    .skip-link {
      position: absolute;
      left: -999px;
      top: auto;
      z-index: 100;
    }

    .skip-link:focus {
      left: 1rem;
      top: 1rem;
      background: var(--bg);
      padding: 0.5rem;
      border: 1px solid var(--accent);
    }
  </style>
</head>

<body>
<a class="skip-link" href="#midi-file">Skip to content</a>

<header>
  <nav aria-label="Breadcrumb">
    <a href="/midi/">← Back to MIDI Files</a>
  </nav>

  <div class="controls">
    <button onclick="toggleTheme()" aria-label="Toggle dark or light theme">
      Theme
    </button>
  </div>
</header>

<main class="container">
  <section id="midi-file">
    <noscript>
      <p>This page requires JavaScript to load MIDI data.</p>
    </noscript>
  </section>
</main>

<footer>
  <p>
    <a href="/midi/">MIDI Index</a> ·
    <a href="/midi/collections/">Collections</a>
  </p>
</footer>

<script src="/midi/assets/js/theme.js"></script>
<script src="/midi/assets/js/file.js"></script>
</body>
</html>
